name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 1. JS syntax check (catches SyntaxError / malformed code) ──
      - name: JS syntax check
        continue-on-error: true
        run: |
          for f in js/*.js; do
            node --check "$f" && echo "OK $f" || echo "FAIL $f"
          done
          for f in js/*.js; do
            node --check "$f" || exit 1
          done

      # ── 2. Verify all <script src> tags point to existing files ──
      - name: Verify script dependencies
        continue-on-error: true
        run: |
          grep -oP '(?<=src=")[^"]+\.js' index.html | while IFS= read -r src; do
            if [ ! -f "$src" ]; then
              echo "MISSING: $src"
            else
              echo "OK: $src"
            fi
          done
          grep -oP '(?<=src=")[^"]+\.js' index.html | while IFS= read -r src; do
            [ -f "$src" ] || exit 1
          done

      # ── 3. ESLint — catches undefined variables and runtime errors ──
      - name: Install ESLint
        run: npm install --no-save eslint@8

      - name: ESLint
        continue-on-error: true
        run: npx eslint "js/*.js" -c .eslintrc.json

      # ── 4. Final gate — fail the job if any step above reported errors ──
      - name: Check all results
        run: |
          FAILED=0
          node --check js/*.js 2>&1 || FAILED=1
          grep -oP '(?<=src=")[^"]+\.js' index.html | while IFS= read -r src; do
            [ -f "$src" ] || exit 1
          done || FAILED=1
          npx eslint "js/*.js" -c .eslintrc.json 2>&1 || FAILED=1
          exit $FAILED
